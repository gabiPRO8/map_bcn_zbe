<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BCN Navigator</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="custom-scrollbar">
      <div class="panel-header">
        <h1>🗺 BCN Navigator</h1>
        <p>Rutas rápidas en Barcelona</p>
        <div id="locationStatus" class="location-status">Ubicación en vivo: desactivada</div>
      </div>

      <div id="loadingOverlay" class="loading-overlay hidden" aria-live="polite">
        <div class="spinner"></div>
        <span id="loadingText">Cargando...</span>
      </div>

      <details class="panel-section" open>
        <summary>Ruta</summary>
        <div class="section-content">
          <div class="input-row">
            <input id="originInput" type="text" value="Tu ubicación actual" readonly />
            <button id="myLocationBtn" class="btn btn-secondary btn-icon" type="button">📍</button>
          </div>

          <button id="swapRouteBtn" class="swap-btn" type="button">⇅ Intercambiar ruta</button>

          <div class="input-column">
            <label for="destinationInput">Destino</label>
            <div class="input-row">
              <input id="destinationInput" type="text" placeholder="Buscar destino..." />
              <button id="destinationSearchBtn" class="btn btn-primary">Buscar</button>
            </div>
            <ul id="destinationResults" class="results-list hidden"></ul>
          </div>

          <div class="button-stack">
            <button id="calculateRoutesBtn" class="btn btn-primary btn-wide">Calcular ruta</button>
            <button id="clearRoutesBtn" class="btn btn-ghost">Limpiar ruta</button>
          </div>

          <div id="routesList" class="routes-list"></div>
        </div>
      </details>
    </aside>

    <main id="mapContainer">
      <div id="map"></div>
    </main>

    <button id="panelToggleBtn" class="panel-toggle-btn" type="button">Abrir panel</button>
    <button id="trafficToggleBtn" class="traffic-toggle-btn" type="button">Tráfico</button>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
