<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BCN Navigator</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="sidebar" class="custom-scrollbar topbar">
      <div class="topbar-brand">
        <span class="topbar-title">BCN Navigator</span>
        <span id="locationStatus" class="topbar-status">Ubicación: buscando...</span>
      </div>

      <div class="search-shell">
        <button id="myLocationBtn" class="search-action search-location" type="button" aria-label="Usar mi ubicación">📍</button>
        <div class="search-input-wrap">
          <input id="destinationInput" type="text" placeholder="¿A dónde quieres ir?" autocomplete="off" />
          <ul id="destinationResults" class="results-list hidden"></ul>
        </div>
        <button id="calculateRoutesBtn" class="search-action search-route" type="button" aria-label="Buscar ruta">➜</button>
      </div>

      <div id="loadingOverlay" class="loading-overlay hidden" aria-live="polite">
        <div class="spinner"></div>
        <span id="loadingText">Cargando...</span>
      </div>

      <div id="routesList" class="routes-list hidden"></div>
    </header>

    <main id="mapContainer">
      <div id="map"></div>
    </main>

    <footer class="legal-footer">
      <a href="privacidad.html">Privacidad</a>
      <a href="terminos.html">Uso</a>
      <a href="contacto.html">Contacto</a>
    </footer>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
